services:
  api-server:
    build: .
    ports:
      - 8080:8080
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql
    container_name: podolab-mysql
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: podolab
    volumes:
      - mysql-data:/var/lib/mysql # Named Volume 방식
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping"]
      interval: 5s
      retries: 10

volumes:
  mysql-data: